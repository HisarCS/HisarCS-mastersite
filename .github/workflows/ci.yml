name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Format check
        run: npm run format:check
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm run test:unit

# Note: the Playwright e2e suite is not run here — it needs the local Supabase
# stack (Docker). Run it locally with `npm run stack` + `npm test`. It can be
# added to CI later with the supabase/setup-cli action + `supabase start`.
